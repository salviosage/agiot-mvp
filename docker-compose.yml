services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agiot
      POSTGRES_PASSWORD: agiot
      POSTGRES_DB: agiot
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agiot -d agiot"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    # bitnami/kafka was removed from Docker Hub (Broadcom, 2025);
    # bitnamilegacy is the same image under the legacy namespace.
    image: bitnamilegacy/kafka:latest
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft mode (no ZooKeeper)
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://agiot:agiot@timescaledb:5432/agiot"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  producer:
    build: ./producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  timescaledb_data:
  kafka_data:
